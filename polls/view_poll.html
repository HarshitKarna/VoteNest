<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Poll &mdash; VoteNest</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

<nav class="navbar" id="mainNav"></nav>
<div class="nav-mobile-menu" id="mobileMenu"></div>

<div class="page-wrap" id="pageWrap">
  <div id="loadingMsg" class="loading-state"><div class="loading-spinner"></div><p>Loading poll…</p></div>
</div>

<!-- Description modal -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
  <div class="desc-modal" onclick="event.stopPropagation()">
    <button class="modal-close-btn" onclick="closeModal()">&#10005;</button>
    <h2 id="modal-title" class="modal-title"></h2>
    <p  id="modal-desc"  class="modal-desc"></p>
  </div>
</div>

<script src="../assets/script.js"></script>
<script type="module">
  import { db, auth, getCurrentUser, renderNav, getBase, escHtml } from "../config/app.js";
  import {
    doc, getDoc, collection, getDocs, query, where,
    addDoc, setDoc, serverTimestamp, updateDoc, Timestamp
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  const base   = getBase();
  const params = new URLSearchParams(window.location.search);
  const code   = params.get("code")?.trim() || "";

  await renderNav();

  const wrap = document.getElementById("pageWrap");

  if (!code) { wrap.innerHTML = "<p>No poll code provided.</p>"; throw new Error("no code"); }

  // ── Load poll ──────────────────────────────────────────────────────────────
  const pollSnap = await getDoc(doc(db, "polls", code));
  if (!pollSnap.exists()) { wrap.innerHTML = "<p>Poll not found.</p>"; throw new Error("not found"); }

  const poll    = pollSnap.data();
  const endTs   = poll.end_time.toMillis();
  const isEnded = poll.status === "ended" || Date.now() >= endTs;

  // Auto-expire if needed
  if (!isEnded === false && poll.status === "active" && Date.now() >= endTs) {
    await updateDoc(doc(db, "polls", code), { status: "ended" });
  }

  // ── Load options ───────────────────────────────────────────────────────────
  const optSnap = await getDocs(query(collection(db, "options"), where("poll_code","==",code)));
  let optionList = optSnap.docs.map(d => ({ id: d.id, ...d.data() }));

  // Load vote counts per option
  const votesSnap = await getDocs(query(collection(db, "votes"), where("poll_code","==",code)));
  const voteCounts = {};
  votesSnap.forEach(v => {
    const oid = v.data().option_id;
    voteCounts[oid] = (voteCounts[oid] || 0) + 1;
  });
  optionList = optionList.map(o => ({ ...o, votes: voteCounts[o.id] || 0 }));

  // ── Check if user voted ────────────────────────────────────────────────────
  const user      = await getCurrentUser();
  const userEmail = user?.email || "";
  let voted       = false;
  let userVoteOptionId = null;

  if (userEmail) {
    const voteId   = code + "_" + userEmail;
    const voteSnap = await getDoc(doc(db, "votes", voteId));
    if (voteSnap.exists()) { voted = true; userVoteOptionId = voteSnap.data().option_id; }
  }

  // ── Results sort ───────────────────────────────────────────────────────────
  const optionsResults = [...optionList].sort((a,b) => b.votes - a.votes);
  const totalVotes     = optionList
    .filter(o => !o.is_disqualified)
    .reduce((s, o) => s + o.votes, 0);

  const canViewResults = userEmail && (poll.show_results || isEnded);
  const showVoteForm   = !isEnded && !voted && userEmail;
  const hasDesc        = optionList.some(o => o.description?.trim());

  // ── Build page ─────────────────────────────────────────────────────────────
  document.title = poll.title + " — VoteNest";
  document.getElementById("loadingMsg").remove();

  const pollUrl = base + "/polls/view_poll.html?code=" + encodeURIComponent(code);

  wrap.innerHTML = `
    <div class="view-poll-header">
      <div class="vp-timer-wrap">
        ${isEnded
          ? `<span class="vp-timer timer-ended">Ended</span>`
          : `<span class="vp-timer" id="vpCountdown" data-end="${endTs}">…</span>`}
      </div>
      <h1 class="vp-title">${escHtml(poll.title)}</h1>
      <p class="vp-question">${escHtml(poll.question)}</p>
      <div class="vp-meta">
        <div class="ptile-code-wrap">
          <span class="ptile-code-label">Code:</span>
          <span class="ptile-code">${escHtml(code)}</span>
          <button class="ptile-copy-btn"  title="Copy code"  onclick="copyToClip('${escHtml(code)}',this)">&#10697;</button>
          <button class="ptile-share-btn" title="Share link" onclick="shareUrl('${escHtml(pollUrl)}',this)">&#8599;</button>
        </div>
        <span class="vp-status ${isEnded ? "status-ended" : "status-active"}">
          ${isEnded ? "&#9679; Ended" : "&#9679; Live"}
        </span>
      </div>
    </div>
    <div id="voteSection"></div>`;

  // Countdown
  const vpt = document.getElementById("vpCountdown");
  if (vpt) {
    const end = parseInt(vpt.dataset.end);
    (function tick() {
      const d = end - Date.now();
      if (d <= 0) { vpt.textContent = "Ended"; vpt.classList.add("timer-ended"); return; }
      const h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000), s = Math.floor((d%60000)/1000);
      vpt.textContent = (h>0?h+"h ":"") + m+"m "+s+"s";
      setTimeout(tick, 1000);
    })();
  }

  const voteSection = document.getElementById("voteSection");

  // ── Vote form ──────────────────────────────────────────────────────────────
  if (showVoteForm) {
    if (hasDesc) {
      voteSection.innerHTML = `
        <p class="vote-instruction">Click a tile to select. Use the &#8505; button to read its description.</p>
        <form id="voteForm"><div class="vote-tile-grid" id="voteTileGrid"></div>
        <button type="submit" class="btn btn-primary vote-submit-btn">Cast Vote</button></form>`;

      const grid = document.getElementById("voteTileGrid");
      for (const opt of optionList) {
        if (opt.is_disqualified) continue;
        const lbl = document.createElement("label");
        lbl.className = "vote-tile";
        lbl.innerHTML = `<input type="radio" name="option_id" value="${opt.id}" hidden required>
          <span class="vote-tile-text">${escHtml(opt.option_text)}</span>
          ${opt.description?.trim() ? `<button type="button" class="desc-peek-btn">&#8505;</button>` : ""}`;
        // Store title/desc on the button element directly — avoids any HTML/JSON escaping issues
        if (opt.description?.trim()) {
          const btn = lbl.querySelector(".desc-peek-btn");
          btn._modalTitle = opt.option_text;
          btn._modalDesc  = opt.description;
          btn.addEventListener("click", e => {
            e.preventDefault();
            e.stopPropagation();
            openModal(btn._modalTitle, btn._modalDesc);
          });
        }
        grid.appendChild(lbl);
      }
    } else {
      voteSection.innerHTML = `
        <p class="vote-instruction">Select an option and cast your vote.</p>
        <form id="voteForm"><div class="vote-options-list" id="voteOptList"></div>
        <button type="submit" class="btn btn-primary vote-submit-btn">Cast Vote</button></form>`;

      const list = document.getElementById("voteOptList");
      for (const opt of optionList) {
        const lbl = document.createElement("label");
        lbl.className = "vote-option" + (opt.is_disqualified ? " disqualified" : "");
        lbl.innerHTML = `<input type="radio" name="option_id" value="${opt.id}"
          ${opt.is_disqualified ? "disabled hidden" : "hidden required"}>
          <span>${escHtml(opt.option_text)}</span>
          ${opt.is_disqualified ? `<em class="disq-label">Disqualified</em>` : ""}`;
        list.appendChild(lbl);
      }
    }

    // Tile selection behaviour
    document.querySelectorAll(".vote-tile").forEach(t => {
      t.addEventListener("click", e => {
        if (e.target.classList.contains("desc-peek-btn")) return;
        document.querySelectorAll(".vote-tile").forEach(x => x.classList.remove("selected"));
        t.classList.add("selected");
        t.querySelector("input[type=radio]").checked = true;
      });
    });
    document.querySelectorAll(".vote-option:not(.disqualified)").forEach(o => {
      o.addEventListener("click", () => {
        document.querySelectorAll(".vote-option").forEach(x => x.classList.remove("selected"));
        o.classList.add("selected");
        o.querySelector("input[type=radio]").checked = true;
      });
    });

    // Submit vote
    document.getElementById("voteForm").addEventListener("submit", async e => {
      e.preventDefault();
      const selected = document.querySelector("input[name=option_id]:checked");
      if (!selected) return;
      const optionId = selected.value;

      try {
        const voteId = code + "_" + userEmail;
        await setDoc(doc(db, "votes", voteId), {
          poll_code:  code,
          user_email: userEmail,
          option_id:  optionId,
          voted_at:   serverTimestamp()
        });
        window.location.href = base + "/polls/vote_submitted.html?code=" + encodeURIComponent(code);
      } catch (err) {
        alert("Error casting vote: " + err.message);
      }
    });

  } else if (!userEmail) {
    voteSection.innerHTML = `<div class="vp-notice"><p>You need to
      <a href="${base}/auth/login.html">login</a> to vote.</p></div>`;

  } else {
    let html = `<div class="vp-notice">`;
    if (voted)      html += `<p class="voted-msg">&#10003; You have already voted.</p>`;
    else if(isEnded) html += `<p class="ended-msg">This poll has ended.</p>`;
    html += `</div>`;

    if (canViewResults) {
      const trophies = ["&#127942;","&#129352;","&#129353;"];
      html += `<div class="results-section"><h3 class="results-title">Results</h3>`;
      let place = 0;
      for (const opt of optionsResults) {
        if (opt.is_disqualified) {
          html += `<div class="result-row disqualified-row">
            <div class="result-label">
              <span class="result-rank">&#9940;</span>
              <span>${escHtml(opt.option_text)} &mdash; <em>DQ: ${escHtml(opt.disqualify_reason||"")}</em></span>
            </div>
            <div class="progress"><div class="progress-bar bg-dark" style="width:100%">DQ</div></div>
          </div>`;
        } else {
          const pct        = totalVotes > 0 ? Math.round((opt.votes/totalVotes)*100) : 0;
          const isWinner   = place === 0 && isEnded;
          const isMyVote   = userVoteOptionId === opt.id;
          const trophy     = isEnded ? (trophies[place] ?? (place+1)+".") : (place+1)+".";
          const yourPick   = isMyVote ? `<span class="your-pick-label"> - your pick</span>` : "";
          const winnerBar  = isWinner ? "winner-bar" : "";
          html += `<div class="result-row ${isWinner?"result-winner":""}" style="animation-delay:${place*0.08}s">
            <div class="result-label">
              <span class="result-rank">${trophy}</span>
              <span>${escHtml(opt.option_text)}${yourPick}</span>
              <span class="result-votes">${opt.votes} vote${opt.votes!==1?"s":""}</span>
            </div>
            <div class="result-bar-row">
              <div class="progress" style="flex:1"><div class="progress-bar ${winnerBar}" style="width:${pct}%"></div></div>
              <span class="result-pct">${pct}%</span>
            </div>
          </div>`;
          place++;
        }
      }
      html += `</div>`;
    } else if (voted) {
      html += `<div class="vp-notice">
        <p>Results will show when the poll ends or the creator allows it.</p>
        <h4 style="margin-top:14px;">Your vote:</h4>`;
      for (const opt of optionList) {
        const isMyVote = userVoteOptionId === opt.id;
        html += `<p class="${isMyVote ? "my-vote-highlight" : ""}">
          ${escHtml(opt.option_text)}${isMyVote ? " &#10003;" : ""}</p>`;
      }
      html += `</div>`;
    }
    voteSection.innerHTML = html;
  }
</script>
<script>
  function openModal(title, desc) {
    document.getElementById("modal-title").textContent = title;
    document.getElementById("modal-desc").textContent  = desc || "No description.";
    document.getElementById("modal-overlay").classList.add("open");
    document.body.classList.add("modal-open");
  }
  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
    document.body.classList.remove("modal-open");
  }
  document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
  function copyToClip(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const o=btn.innerHTML; btn.innerHTML="&#10003;"; btn.classList.add("copied");
      setTimeout(()=>{ btn.innerHTML=o; btn.classList.remove("copied"); },1500);
    });
  }
  function shareUrl(url, btn) {
    navigator.clipboard.writeText(url).then(() => {
      const o=btn.innerHTML; btn.innerHTML="&#10003;"; btn.classList.add("copied");
      setTimeout(()=>{ btn.innerHTML=o; btn.classList.remove("copied"); },1500);
    });
  }
</script>
</body>
</html>
